name: FanHub-1
version: 1.0.0
description: APM project for FanHub-1
author: Barton Mathis
dependencies:
  apm: []
  mcp: []
scripts:
  install-docs: curl -fsSL --create-dirs -o fanhubapm/architecture.md https://raw.githubusercontent.com/MSBart2/apm/main/fanhubapm/architecture.md
    && curl -fsSL --create-dirs -o fanhubapm/breaking-bad-universe.md https://raw.githubusercontent.com/MSBart2/apm/main/fanhubapm/breaking-bad-universe.md
  uninstall-docs: node -e "const fs = require('fs'); ['fanhubapm/architecture.md','fanhubapm/breaking-bad-universe.md'].forEach(f
    => { try { fs.unlinkSync(f); } catch(e) {} })"
