version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5265:5265"
    environment:
      NODE_ENV: development
      JWT_SECRET: dev_secret_change_in_production
      PORT: 5265
    volumes:
      - ./backend/src:/app/src
      - fanhub_data:/app/data
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5265
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm start

volumes:
  fanhub_data:
