version: '3.8'

# The .NET backend uses a local SQLite database (fanhub.db) created by
# EF Core / SeedData on first run. No separate database service is required.
#
# Usage:
#   docker-compose up --build       # build and run the API in a container
#   dotnet run --project Backend    # or run directly without Docker

services:
  # Backend API (optional - can run locally with `dotnet run`)
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: fanhub-dotnet-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/fanhub.db
    ports:
      - "5000:8080"
    volumes:
      - fanhub_dotnet_data:/data

volumes:
  fanhub_dotnet_data:
