version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fanhub-java-backend
    ports:
      - "5265:5265"
    environment:
      DATABASE_URL: jdbc:sqlite:/data/fanhub.db
      JWT_SECRET: dev_secret_change_in_production
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./backend/src:/app/src
      - fanhub_java_data:/data

  frontend:
    build: ./frontend
    container_name: fanhub-java-frontend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REACT_APP_API_URL: http://localhost:5265
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    stdin_open: true
    tty: true

volumes:
  fanhub_java_data:
