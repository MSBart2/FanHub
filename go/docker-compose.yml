version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fanhub-go-backend
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DB_PATH: "/data/fanhub.db"
      JWT_SECRET: "your-secret-key-change-in-production"
      GIN_MODE: "debug"
    volumes:
      - fanhub_go_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fanhub-go-frontend
    ports:
      - "3003:3003"
    environment:
      REACT_APP_API_URL: "http://localhost:8090"
      PORT: "3003"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fanhub_go_data:
