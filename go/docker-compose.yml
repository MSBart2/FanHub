version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fanhub-go-backend
    ports:
      - "5265:5265"
    environment:
      PORT: "5265"
      DB_PATH: "/data/fanhub.db"
      JWT_SECRET: "your-secret-key-change-in-production"
      GIN_MODE: "debug"
    volumes:
      - fanhub_go_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fanhub-go-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:5265"
      PORT: "3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fanhub_go_data:
